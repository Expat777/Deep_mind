services:
  db:
    image: postgres:16-alpine
    container_name: datamind_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: datamind
      POSTGRES_PASSWORD: datamind
      POSTGRES_DB: datamind
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datamind"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    container_name: datamind_api
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    environment:
      # Внутри docker-сети БД доступна по имени сервиса `db`, а не localhost.
      DATABASE_URL: postgresql+psycopg2://datamind:datamind@db:5432/datamind
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  streamlit:
    build: .
    container_name: datamind_ui
    restart: unless-stopped
    command: >
      streamlit run streamlit_app.py
      --server.port 8501 --server.address 0.0.0.0
      --server.headless true --browser.gatherUsageStats false
    env_file: .env
    environment:
      # UI ходит в api по имени сервиса внутри docker-сети.
      API_URL: http://api:8000
    depends_on:
      - api
    ports:
      - "8501:8501"

volumes:
  pgdata:
