services:
  db:
    image: postgres:16-alpine
    container_name: datamind_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: datamind
      POSTGRES_PASSWORD: datamind
      POSTGRES_DB: datamind
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datamind"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: ./backend
    container_name: datamind_app
    restart: unless-stopped
    # Секреты (DEEPSEEK_*, SELECTEL_*) берутся из backend/.env
    env_file: backend/.env
    # Внутри сети compose БД доступна по хосту `db`, поэтому переопределяем DATABASE_URL
    environment:
      DATABASE_URL: postgresql+psycopg2://datamind:datamind@db:5432/datamind
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
